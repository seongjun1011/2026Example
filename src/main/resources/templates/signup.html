<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hap06</title>
</head>
<body>
    <h3>회원가입</h3>
    <form action="member" method="post">
        <p>아이디 : <input type="text" name="id"/>
        <p>비밀번호 : <input type="text" name="passwd"/>
        <p>거주지 : <select name="city">
                        <option value="서울특별시">서울특별시</option>
                        <option value="경기도">경기도</option>
                        <option value="인천광역시">인천광역시</option>
                        <option value="충청북도">충청북도</option>
                        <option value="충청남도">충청남도</option>
                        <option value="전북특별자치도">전북특별자치도</option>
                        <option value="경상북도">경상북도</option>
                        <option value="경상남도">강원남도</option>
                   </select>

        <p>성별: <input type="radio" name="sex" value="남성"checked>남성
                <input type="radio" name="sex" value="여성">여성
        <p>성별: <input type="checkbox" name="hobby" value="독서"checked>독서
                <input type="checkbox" name="hobby" value="운동">운동
                <input type="checkbox" name="hobby" value="영화">영화
        <p><textarea name = "greetings" cols = "30" rows = "3" placeholder = "가입 인사를 입력해주세요"></textarea>
        <p>
            <button type="submit" value="가입하기">가입하기</button>
            <button type="reset" value="취소하기">취소하기</button>
        </p>
    </form>
</body>
</html>
