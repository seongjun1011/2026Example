<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>파일전송결과페이지</title>
</head>
<body>
    <h1 th:text="${title}"/>
    <p>원본파일이름: <span th:utext="${originFileName}"/></p>
    <p>컴퓨터저장파일이름: <span th:utext="${saveFileName}"/></p>
    <p><img th:src="'/images/' + ${saveFileName}" width="250"/></p>
</body>
</html>
